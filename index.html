<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/logo-azulescuroB.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MasterEduTech</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('metdc:theme')
          if (t === 'light' || t === 'dusk' || t === 'dark' || t === 'classico') {
            document.documentElement.setAttribute('data-theme', t)
          }
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
